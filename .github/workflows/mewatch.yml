name: meWATCH EPG Auto Build

on:
  schedule:
    - cron: "30 2 * * *"   # 🇨🇳 北京时间 10:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 安装依赖
      - name: Install deps
        run: pip install requests

      # 4. 运行脚本
      - name: Run EPG script
        run: python mewatch/mewatch_epg.py

      # 5. 提交生成文件（这里是关键）
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add mewatch/mewatch.json mewatch/mewatch.xml mewatch/mewatch.xml.gz

          git commit -m "update mewatch epg" || echo "no changes"

          git push
