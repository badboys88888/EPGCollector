name: meWATCH EPG Auto Build

on:
  schedule:
    - cron: "30 2 * * *"   # 北京时间 10:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装依赖
      - name: Install deps
        run: pip install requests

      # 运行脚本
      - name: Run script
        run: python mewatch/mewatch_epg.py

      # 👉 调试（强烈建议保留）
      - name: Debug files
        run: ls -R

      # 提交文件
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add mewatch/mewatch_epg.json mewatch/mewatch.xml mewatch/mewatch.xml.gz mewatch/mewatch_epg.json

          git commit -m "update mewatch epg" || echo "no changes"

          git push
