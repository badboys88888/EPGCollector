name: Generate EPG-PRO JSON

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Python环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. 安装依赖
      - name: Install dependencies
        run: pip install requests lxml

      # 4. 运行脚本
      - name: Run EPG script
        run: python epg_script/epg_script.py

      # 🔍 5. 调试（可留可删）
      - name: Debug files
        run: ls -R

      # 6. 检查文件（✅ 已修正路径）
      - name: Verify JSON update
        run: |
          if [ -f epg-pro.json ]; then
            echo "JSON file exists"
            head -n 20 epg-pro.json
          else
            echo "JSON file not found"
            exit 1
          fi

      # 7. 提交（✅ 已修正路径）
      - name: Commit and Push updated JSON
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "action@github.com"
          git add epg-pro.json
          git commit -m "Auto-update EPG-PRO JSON: $(date -u)" || echo "No changes to commit"
          git push

      # 8. 失败通知（✅ 不会404）
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 1
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: "❌ EPG-PRO JSON 生成失败，请检查 Actions 日志。"
              });
            } else {
              console.log("No open issues found, skipping comment.");
            }
