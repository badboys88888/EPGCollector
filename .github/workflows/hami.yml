name: Hami EPG Auto Update

on:
  schedule:
    - cron: '10 18 * * *'   # 比 StarHub 晚10分钟，避免同时push
  workflow_dispatch:
  push:
    paths:
      - 'hami/**'

jobs:
  update-hami:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install deps
      run: pip install requests

    - name: Run Hami EPG
      run: |
        echo "🚀 Running Hami EPG..."
        cd hami
        python hami_epg.py

    - name: Commit Hami result
      run: |
        git config user.name "github-actions"
        git config user.email "bot@github.com"

        git add hami/

        if git diff --cached --quiet; then
          echo "⚠️ No changes"
        else
          git commit -m "📺 Hami EPG update $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
        fi
