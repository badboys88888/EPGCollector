name: Generate beIN SPORTS EPG

on:
  # 定时触发：每天运行3次（UTC时间 0:00, 8:00, 16:00）
  schedule:
    - cron: '0 0,8,16 * * *'
  # 允许手动触发
  workflow_dispatch:
  # 当脚本或配置文件更新时也触发
  push:
    paths:
      - 'beinsports_epg.py'
      - 'config.json'
      - '.github/workflows/generate-epg.yml'

# 设置环境变量
env:
  OUTPUT_XML: "epg.xml"
  OUTPUT_GZ: "epg.xml.gz"

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests xmltodict
        # 如果需要gzip支持
        pip install gzip
        
    - name: 列出文件
      run: ls -la
      
    - name: 运行EPG生成脚本
      run: |
        python beinsports_epg.py
        echo "EPG生成完成，检查输出文件..."
        ls -la *.xml *.gz || true
        
    - name: 检查输出文件
      run: |
        if [ -f "$OUTPUT_XML" ]; then
          echo "✅ XML文件生成成功"
          echo "文件大小: $(wc -c < "$OUTPUT_XML") 字节"
          echo "文件前5行:"
          head -5 "$OUTPUT_XML"
        else
          echo "❌ XML文件未生成"
          exit 1
        fi
        
        if [ -f "$OUTPUT_GZ" ]; then
          echo "✅ GZ文件生成成功"
          echo "压缩文件大小: $(wc -c < "$OUTPUT_GZ") 字节"
        else
          echo "⚠️ GZ文件未生成"
        fi
        
    - name: 设置Git配置
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    - name: 检查文件变更
      id: git-check
      run: |
        git status
        git add -N .
        if git diff --name-only | grep -E "\.(xml|gz)$"; then
          echo "有文件变更"
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "无文件变更"
          echo "changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: 提交更新文件
      if: steps.git-check.outputs.changes == 'true'
      run: |
        # 只添加XML和GZ文件
        git add "$OUTPUT_XML" "$OUTPUT_GZ" 2>/dev/null || true
        
        # 检查是否有需要提交的变更
        if git diff --cached --quiet; then
          echo "没有需要提交的变更"
        else
          git commit -m "自动更新 EPG 数据 [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push
          echo "✅ 文件已提交到仓库"
        fi
        
    - name: 上传工作流产物
      uses: actions/upload-artifact@v4
      with:
        name: epg-files
        path: |
          ${{ env.OUTPUT_XML }}
          ${{ env.OUTPUT_GZ }}
        retention-days: 7
