name: Generate beIN SPORTS EPG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: 运行EPG生成脚本
      run: |
        cd beinsports
        python beinsports_epg.py
        
    - name: 检查生成的文件
      run: |
        echo "检查 beinsports 目录内容:"
        ls -la beinsports/
        
        if [ -f "beinsports/beinsports_epg.xml" ]; then
          echo "✅ beinsports_epg.xml 生成成功"
          echo "文件大小: $(wc -c < beinsports/beinsports_epg.xml) 字节"
        else
          echo "❌ beinsports_epg.xml 未生成"
          exit 1
        fi
        
        if [ -f "beinsports/beinsports_epg.xml.gz" ]; then
          echo "✅ beinsports_epg.xml.gz 生成成功"
          echo "压缩文件大小: $(wc -c < beinsports/beinsports_epg.xml.gz) 字节"
        fi
        
    - name: 提交更新
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add beinsports/beinsports_epg.xml beinsports/beinsports_epg.xml.gz
        if git diff --cached --quiet; then
          echo "没有新的EPG数据，无需提交"
        else
          git commit -m "自动更新 beIN SPORTS EPG [$(date -u '+%Y-%m-%d %H:%M')]"
          git push
        fi
