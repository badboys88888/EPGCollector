name: Generate beIN SPORTS EPG

on:
  # 定时触发：每天运行3次（UTC时间 0:00, 8:00, 16:00）
  schedule:
    - cron: '0 0,8,16 * * *'
  # 允许手动触发
  workflow_dispatch:
  # 当脚本或配置文件更新时也触发
  push:
    paths:
      - 'beinsports_epg.py'
      - 'config.json'
      - '.github/workflows/generate-epg.yml'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        # 只安装必需的包
        pip install requests
        
    - name: 验证Python环境
      run: |
        python --version
        python -c "import sys; print(f'Python {sys.version}')"
        
    - name: 运行EPG生成脚本
      run: |
        python beinsports_epg.py
        
    - name: 检查生成的文件
      run: |
        echo "当前目录:"
        pwd
        echo "目录内容:"
        ls -la
        echo "XML文件信息:"
        if [ -f "epg.xml" ]; then
          ls -lh epg.xml
          echo "XML前3行:"
          head -3 epg.xml
        else
          echo "❌ epg.xml 未生成"
        fi
        if [ -f "epg.xml.gz" ]; then
          ls -lh epg.xml.gz
        fi
        
    - name: 配置Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    - name: 检查文件变更
      id: check-changes
      run: |
        echo "检查文件变更状态..."
        git status
        if git diff --name-only | grep -q "epg.xml"; then
          echo "检测到 epg.xml 变更"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "没有检测到变更"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: 提交变更
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        git add epg.xml epg.xml.gz
        git commit -m "自动更新 EPG 数据 [$(date +'%Y-%m-%d %H:%M UTC')]"
        git push
        
    - name: 上传工作流产物
      uses: actions/upload-artifact@v4
      with:
        name: epg-files
        path: |
          epg.xml
          epg.xml.gz
        retention-days: 7
