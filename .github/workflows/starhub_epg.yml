name: StarHub EPG Auto Update

on:
  # 定时触发：每天UTC时间18:00运行（新加坡时间02:00，每天凌晨2点）
  schedule:
    - cron: '0 18 * * *'
  
  # 允许手动触发
  workflow_dispatch:
  
  # 当有代码推送到main分支时也运行
  push:
    branches: [ main, master ]

jobs:
  update-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        # 使用个人访问令牌，以便后续推送
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install xmltodict
        echo "依赖安装完成"
        
    - name: 运行StarHub EPG抓取脚本
      run: |
        echo "开始运行EPG抓取脚本..."
        cd starhub
        python starhub_epg.py
        echo "脚本运行完成"
        
    - name: 检查文件变更
      id: check_changes
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 检查是否有文件变更
        git add .
        if git diff --cached --quiet; then
          echo "没有检测到文件变更"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "检测到文件变更"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi
        
    - name: 提交并推送变更
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        # 获取当前时间
        current_time=$(date -u "+%Y-%m-%d %H:%M:%S UTC")
        
        # 创建提交
        git commit -m "📺 自动更新StarHub EPG数据 [$current_time]"
        
        # 推送到仓库
        git push
        echo "变更已推送"
        
    - name: 上传EPG文件作为工件
      uses: actions/upload-artifact@v4
      with:
        name: starhub-epg-files
        path: |
          starhub/starhub_epg.xml
          starhub/starhub.m3u
        retention-days: 7
        
    - name: 发送成功通知（可选）
      if: success()
      run: |
        echo "✅ StarHub EPG数据抓取成功完成于 $(date)"
        echo "📁 生成文件:"
        echo "  - starhub_epg.xml"
        echo "  - starhub.m3u"
        
    - name: 发送失败通知（可选）
      if: failure()
      run: |
        echo "❌ StarHub EPG数据抓取失败于 $(date)"
