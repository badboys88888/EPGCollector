name: NOWTV EPG Update

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Python环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: pip install requests

      # 4️⃣ 运行脚本（关键：路径已修正）
      - name: Run NOWTV EPG
        run: python nowtv/nowtv_epg.py

      # 5️⃣ 提交生成文件（关键：路径已修正）
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add nowtv/nowtv.xml nowtv/nowtv.xml.gz
          git commit -m "Update NOWTV EPG $(date)" || echo "No changes"
          git push
