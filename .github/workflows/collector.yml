name: EPG Collector

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时更新
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EPG Collector
        run: python EPGCollector.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add channels.json
          git commit -m "update channels.json" || exit 0
          git push
