name: MyTV SUPER EPG Auto Builder

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. 拉代码
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Python环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 3. 安装依赖
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # =========================
      # 4. 运行脚本
      # =========================
      - name: Run script
        run: |
          cd mytvsuper
          python mytvsuper.py

      # =========================
      # 5. 检查文件（防止空）
      # =========================
      - name: Verify output
        run: |
          ls -lah mytvsuper || true

      # =========================
      # 6. 提交回仓库（稳定版）
      # =========================
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mytvsuper/epg.xml mytvsuper/epg.xml.gz mytvsuper/epg.json || true

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Auto update EPG $(date '+%Y-%m-%d %H:%M:%S')"
          git push
