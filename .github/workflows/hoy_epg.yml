name: HOYTV EPG Update

on:
  schedule:
    - cron: "0 0 * * *"   # ⏰ 每天运行一次（UTC时间）
  workflow_dispatch:      # 👉 支持手动运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖（你这个脚本其实不用，但保留）
      - name: Install dependencies
        run: pip install requests

      # 4️⃣ 运行脚本（关键）
      - name: Run EPG script
        run: python hoytv/hoytv.py

      # 5️⃣ 提交生成文件
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add hoytv/epg.xml hoytv/epg.xml.gz
          git commit -m "Update HOYTV EPG" || echo "No changes"
          git push
